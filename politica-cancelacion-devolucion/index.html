      <h1>Política de cancelación y devolución de reservas</h1>
      <p class="hero-subtitle">
        Cómo gestionamos las cancelaciones, cambios de cita y devoluciones
        del anticipo en tus reservas de servicios.
      </p>
      <p class="hero-meta">
        <strong>Última actualización:</strong> Marzo 2026 ·
        <strong>Ámbito:</strong> Reservas de servicios de peluquería y asesoría de imagen.
      </p>

      <section>
        <h2>1. Anticipo para confirmar la reserva</h2>
        <p>
          Para confirmar determinadas reservas puede solicitarse el abono previo
          de un anticipo equivalente al <strong>25&nbsp;% del precio del servicio</strong>
          elegido. Este importe actúa como garantía de la cita y se descuenta del
          precio total del servicio el día de la prestación.
        </p>
      </section>

      <section>
        <h2>2. Plazo para cancelar o modificar sin penalización</h2>
        <p>
          Puedes cancelar o modificar tu reserva <strong>sin penalización hasta 24 horas
          antes</strong> de la hora programada, a través de los canales indicados en la web
          (teléfono, email o sistema de reservas).
        </p>
        <p>
          Si cancelas dentro de ese plazo, el <strong>25&nbsp;% abonado se reembolsará
          íntegramente</strong> mediante el mismo método de pago utilizado o se podrá destinar,
          si así lo acuerdas, a una nueva cita.
        </p>
      </section>

      <section>
        <h2>3. Cancelaciones tardías y no presentación</h2>
        <p>
          Si cancelas la reserva con menos de 24 horas de antelación, o no te presentas
          a la cita sin previo aviso, el <strong>25&nbsp;% abonado no será reembolsable</strong>,
          al destinarse a cubrir el tiempo bloqueado de agenda y los recursos preparados
          para tu servicio.
        </p>
      </section>

      <section>
        <h2>4. Modificación de la reserva</h2>
        <p>
          Siempre que haya disponibilidad, podrás solicitar un cambio de fecha y hora de
          tu cita hasta 24 horas antes del horario reservado.
        </p>
        <p>
          En caso de cambios solicitados dentro de las 24 horas previas, se valorará cada
          situación individualmente, pero no se garantiza la conservación del anticipo.
        </p>
      </section>

      <section>
        <h2>5. Servicio no prestado por causas imputables a Ricardo Buriticá</h2>
        <p>
          Si Ricardo Buriticá no pudiera prestar el servicio reservado por causas
          imputables a su responsabilidad (por ejemplo, enfermedad u otra incidencia
          justificada), se ofrecerá al cliente:
        </p>
        <ul>
          <li>Reprogramar la cita en una nueva fecha, manteniendo el anticipo, o</li>
          <li>Solicitar el <strong>reembolso completo del 25&nbsp;% abonado</strong>.</li>
        </ul>
      </section>

      <section>
        <h2>6. Servicio no prestado por causas ajenas a ambas partes</h2>
        <p>
          Si el servicio no pudiera prestarse por causas ajenas tanto al cliente como a
          Ricardo Buriticá (por ejemplo, incidencias externas graves o restricciones
          imprevistas), se intentará reprogramar la cita en la primera fecha disponible.
        </p>
        <p>
          Si no fuera posible encontrar una alternativa razonable, se procederá al
          <strong>reembolso del anticipo</strong> abonado.
        </p>
      </section>

      <section>
        <h2>7. Procedimiento para solicitar devolución o reclamación</h2>
        <p>Si necesitas cancelar, modificar o reclamar sobre una reserva:</p>
        <ul>
          <li><strong>Comunicación:</strong> escribe a <a href="mailto:info@ricardoburitica.com">info@ricardoburitica.com</a> o llama al <strong>+34 646 24 64 87</strong>, indicando tu nombre, fecha y hora de la cita y el servicio reservado.</li>
          <li><strong>Documentación:</strong> si fuera necesario, se podrá solicitar la confirmación de reserva o justificante de pago del anticipo.</li>
          <li><strong>Plazo de respuesta:</strong> se responderá a tu solicitud en un plazo razonable, explicando la decisión adoptada (reembolso, reprogramación, etc.).</li>
          <li><strong>Reembolso:</strong> si procede el reembolso, se realizará utilizando el mismo medio de pago empleado para la reserva, salvo acuerdo diferente contigo.</li>
        </ul>
        <div class="highlight">
          Si no estás de acuerdo con la resolución, puedes presentar una reclamación
          ante las autoridades competentes en materia de consumo. El establecimiento
          dispone de hojas oficiales de reclamación a tu disposición en
          Calle Rambla Volart 2 bis, 1º‑4ª, 08041 Barcelona.
        </div>
      </section>
